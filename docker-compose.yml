services:
  backend:
    build:
      context: .
      dockerfile: src/VehicleTrackerApi/Dockerfile
    container_name: vehicle-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  frontend:
    build:
      context: ./src/VehicleTrackerDashboard
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: vehicle-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend